name: 📱 Mobile Release CI/CD

on:
  push:
    tags:
      - 'mobile-v*'

jobs:
  build-android:
    name: 🤖 Build Android Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apps

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar dependencias
        run: npm ci

      - name: Importar Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/release.keystore

      - name: Build Release AAB
        run: cd android && ./gradlew bundleRelease

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: Apps/android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    name: 🍎 Build iOS Release
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Apps

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm ci && cd ios && pod install

      - name: Importar certificados Apple
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Build Archive
        run: xcodebuild -workspace ios/CertiDocs.xcworkspace -scheme CertiDocs -configuration Release archive -archivePath CertiDocs.xcarchive

      - name: Exportar IPA
        run: xcodebuild -exportArchive -archivePath CertiDocs.xcarchive -exportPath . -exportOptionsPlist ios/ExportOptions.plist

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: CertiDocs.ipa
          path: Apps/CertiDocs.ipa

  notify:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Notificación completado
        run: echo "✅ Build completado! Listos para publicar en tiendas"